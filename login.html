<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Stance Customs — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <a href="index.html" class="header-brand">
      <div class="logo-box">
        <img src="images/logo.png" alt="The Stance Customs Logo">
      </div>
      <div class="brand-name"><em>T</em>HE STANCE CUSTOMS</div>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="active">Login</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>

   
    <div class="auth-layout">

      <div class="auth-image">
        <img src="images/golf.jpeg" alt="Stance car"
          onerror="this.style.display='none'"/>
        <div class="auth-image-placeholder" id="authPlaceholder" style="display:none">
          THE STANCE CUSTOMS
        </div>
        <div class="auth-overlay"></div>
      </div>

      <div class="auth-form-side">

        <div class="auth-tabs">
          <a href="#" class="auth-tab active" id="tab-login"
             onclick="showTab('login'); return false;">Login</a>
          <a href="#" class="auth-tab" id="tab-signup"
             onclick="showTab('signup'); return false;">Sign Up</a>
        </div>

       
        <div id="form-login">
          <span class="section-label" style="margin-bottom:28px;">Welcome back</span>
          <div class="form-group">
            <label for="login-email">Username or Email</label>
            <input type="email" id="login-email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="login-pass">Password</label>
            <input type="password" id="login-pass" placeholder="••••••••">
          </div>
          <div class="form-submit">
            <button class="btn btn-accent" onclick="handleLogin()">Log In</button>
          </div>
          <p class="form-switch">
            Don't have an account?
            <a href="#" onclick="showTab('signup'); return false;">Sign Up</a>
          </p>
        </div>

        
        <div id="form-signup" style="display:none;">
          <span class="section-label" style="margin-bottom:28px;">Create your account</span>
          <div class="form-group">
            <label for="signup-email">Username or Email</label>
            <input type="email" id="signup-email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="signup-pass">New Password</label>
            <input type="password" id="signup-pass" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" placeholder="••••••••">
          </div>
          <div class="form-submit">
            <button class="btn btn-yellow" onclick="handleSignup()">Sign Up</button>
          </div>
          <p class="form-switch">
            Already have an account?
            <a href="#" onclick="showTab('login'); return false;">Log In</a>
          </p>
        </div>

      </div>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <footer>
    <p>&copy; 2026 Ditso Arnold Mmopi — The Stance Customs. All rights reserved.</p>
  </footer>

  <script>
    
    document.querySelector('.auth-image img').onerror = function() {
      this.style.display = 'none';
      document.getElementById('authPlaceholder').style.display = 'flex';
    };

    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').style.display  = isLogin ? 'block' : 'none';
      document.getElementById('form-signup').style.display = isLogin ? 'none'  : 'block';
      document.getElementById('tab-login').classList.toggle('active',  isLogin);
      document.getElementById('tab-signup').classList.toggle('active', !isLogin);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerHTML = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value.trim();
      if (!email || !pass) { showToast('Please fill in all fields.'); return; }
      showToast('<strong>Welcome back!</strong> Redirecting...');
      setTimeout(() => window.location.href = 'index.html', 1800);
    }

    function handleSignup() {
      const email   = document.getElementById('signup-email').value.trim();
      const pass    = document.getElementById('signup-pass').value.trim();
      const confirm = document.getElementById('signup-confirm').value.trim();
      if (!email || !pass || !confirm) { showToast('Please fill in all fields.'); return; }
      if (pass !== confirm) { showToast('Passwords do not match.'); return; }
      showToast('<strong>Account created!</strong> Please log in.');
      setTimeout(() => showTab('login'), 2000);
    }
  </script>

</body>
</html>
